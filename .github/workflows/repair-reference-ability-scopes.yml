name: Repair reference ability scopes

on:
  push:
    branches:
      - fix/reference-ability-faction-keys
    paths:
      - scripts/fix-reference-ability-scopes.mjs
      - .github/workflows/repair-reference-ability-scopes.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repair ability scopes
        run: node scripts/fix-reference-ability-scopes.mjs

      - name: Validate reference data
        run: pnpm validate:reference-data

      - name: Commit repaired data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reference/abilities.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "fix(reference): assign ability scopes"
          git push origin HEAD:fix/reference-ability-faction-keys
