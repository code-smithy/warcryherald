name: Extract Warcrier Reference Data

on:
  workflow_dispatch:
  push:
    branches:
      - codex/warcrier-reference-extraction
    paths:
      - scripts/extract-warcrier-reference.py
      - scripts/warcrier-extractor-parts/**
      - .github/workflows/extract-warcrier-reference.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/extract-warcrier-reference.py
      - scripts/warcrier-extractor-parts/**
      - .github/workflows/extract-warcrier-reference.yml

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out extraction branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Assemble extractor
        shell: bash
        run: |
          if compgen -G "scripts/warcrier-extractor-parts/part-*.pyfrag" > /dev/null; then
            cat scripts/warcrier-extractor-parts/part-*.pyfrag > scripts/extract-warcrier-reference.py
          fi
          python -m py_compile scripts/extract-warcrier-reference.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4

      - name: Extract current Warcrier data
        run: python scripts/extract-warcrier-reference.py --output-dir data/reference

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate reference JSON
        run: pnpm validate:reference-data

      - name: Commit generated reference data
        shell: bash
        run: |
          if [ -d scripts/warcrier-extractor-parts ]; then
            rm -rf scripts/warcrier-extractor-parts
          fi
          git add -A scripts/extract-warcrier-reference.py scripts/warcrier-extractor-parts data/reference
          if git diff --cached --quiet; then
            echo "No generated changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data(reference): extract current Warcrier dataset"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
