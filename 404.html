<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warcry Herald</title>
    <script>
      var path = window.location.pathname.replace(/\/$/, "");
      var repo = "/warcryherald";
      if (path.indexOf(repo) === 0) {
        path = path.slice(repo.length);
      }
      window.location.replace(repo + "/#" + path + window.location.search + window.location.hash);
    </script>
  </head>
  <body>
    <p>Loading Warcry Herald...</p>
  </body>
</html>
